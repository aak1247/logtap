name: e2e-regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/e2e-regression.yml"
      - "cmd/e2e-server/**"
      - "internal/**"
      - "web/**"
      - "go.mod"
      - "go.sum"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/e2e-regression.yml"
      - "cmd/e2e-server/**"
      - "internal/**"
      - "web/**"
      - "go.mod"
      - "go.sum"

concurrency:
  group: e2e-regression-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration-api-worker:
    name: integration-api-worker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration tests
        run: go test ./internal/integration -count=1

  ui-e2e:
    name: ui-e2e-playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
      HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
      ALL_PROXY: ${{ secrets.ALL_PROXY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run UI E2E
        working-directory: web
        env:
          CI: "true"
        run: npm run e2e -- --reporter=list

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
          retention-days: 14
